# Render Blueprint Specification for SQL Query Optimizer Agent
# Provisions the FastAPI backend and React static site automatically.

services:
  # 1. FastAPI Backend Service
  - type: web
    name: sql-query-optimizer-backend
    runtime: python
    rootDir: Project/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OLLAMA_BASE_URL
        value: http://localhost:11434  # Modify to point to your external Ollama service if needed
      - key: PYTHON_VERSION
        value: 3.10.12

  # 2. React Static Frontend Site
  - type: static
    name: sql-query-optimizer-frontend
    rootDir: Project/frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: sql-query-optimizer-backend
          property: host
